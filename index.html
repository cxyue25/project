        // 搜索功能
        function handleSearch(keyword) {
            if (!keyword.trim()) {
                showHome();
                return;
            }
            
            const lowerKeyword = keyword.toLowerCase();
            const allItems = [];
            
            // 收集所有项目数据
            // 国家自然科学基金
            for (const sub in FULL_DB.nsfc.subCategories) {
                FULL_DB.nsfc.subCategories[sub].forEach(item => {
                    allItems.push({ ...item, category: `国家自然科学基金 - ${sub}` });
                });
            }
            // 其他类别
            ['major', 'province', 'city', 'advice'].forEach(type => {
                FULL_DB[type].items.forEach(item => {
                    allItems.push({ ...item, category: FULL_DB[type].title });
                });
            });
            
            // 筛选匹配项
            const matchedItems = allItems.filter(item => 
                item.name.toLowerCase().includes(lowerKeyword) || 
                (item.remarks && item.remarks.toLowerCase().includes(lowerKeyword)) || 
                (item.agency && item.agency.toLowerCase().includes(lowerKeyword))
            );
            
            const contentArea = document.getElementById('content-area');
            const breadcrumb = document.getElementById('breadcrumb');
            
            // 更新面包屑和菜单高亮
            breadcrumb.textContent = `搜索结果 / 关键词：${keyword}`;
            resetMenuActive();
            
            // 渲染搜索结果
            let html = `
            <div class="animate-slide">
                <h2 class="text-2xl font-bold mb-6 text-blue-900">🔍 搜索结果（共${matchedItems.length}条）</h2>
                <div class="space-y-4">`;
            
            if (matchedItems.length === 0) {
                html += `
                <div class="bg-white p-8 rounded-xl text-center border border-slate-200">
                    <div class="text-slate-400 mb-2">🔍</div>
                    <div class="text-lg font-medium text-slate-700">未找到相关项目</div>
                    <div class="text-sm text-slate-500 mt-1">建议尝试其他关键词或检查拼写</div>
                </div>`;
            } else {
                matchedItems.forEach((item, index) => {
                    html += `
                    <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-lg font-bold text-slate-900">${index + 1}. ${item.name}</h3>
                            <span class="text-xs bg-blue-50 text-blue-700 px-2 py-1 rounded-full">${item.category}</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm mb-3">
                            <div>
                                <span class="text-slate-500">主管部门：</span>
                                <span class="text-slate-800">${item.agency || '无'}</span>
                            </div>
                            <div>
                                <span class="text-slate-500">咨询电话：</span>
                                <span class="text-slate-800">${item.phone ? item.phone.replace(/\n/g, '<br>') : '无'}</span>
                            </div>
                        </div>
                        ${item.remarks ? `
                        <div class="mt-2 text-sm text-slate-700 line-clamp-2">
                            <span class="text-slate-500">说明：</span>
                            <span>${item.remarks}</span>
                        </div>` : ''}
                        <div class="mt-3 pt-3 border-t border-slate-100 text-sm">
                            <span class="text-slate-500">最新申报时间：</span>
                            <span class="text-slate-800 font-medium">${item.t26 || item.t25 || item.t24 || '暂无'}</span>
                        </div>
                    </div>`;
                });
            }
            
            html += `</div></div>`;
            contentArea.innerHTML = html;
        }

        // 重置菜单高亮状态
        function resetMenuActive() {
            // 重置主菜单
            document.querySelectorAll('.main-btn').forEach(btn => {
                btn.classList.remove('nav-active');
            });
            // 重置首页按钮
            document.getElementById('btn-home').classList.remove('nav-active');
            // 重置子菜单
            document.querySelectorAll('.sub-btn').forEach(btn => {
                btn.classList.remove('sub-nav-active');
            });
        }
    </script>
